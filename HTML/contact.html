           <h1>Como nos contatar</h1>

    <h2>Mande-nos uma mensagem via e-mail!</h2>
    
    <div class="Mensagem">
    <form action="mailto:lojaoceane@outlook.com" method="post" enctype="text/plain">
    <label for="name">Nome:</label>
    <input type="text" id="name" name="name" required placeholder="Digite seu nome completo aqui">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="Seu@email.com">

    <label for="message">Mensagem:</label>
    <textarea id="message" name="message" rows="4" cols="70" placeholder="Digite a sua mensagem aqui:" required></textarea> <br>

    <button type="submit">Enviar</button>
    </form>
